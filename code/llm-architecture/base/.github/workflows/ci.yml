name: transformer-ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd base
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          cd base
          flake8 transformer tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd base
          pip install -r requirements.txt
      - name: Run pytest
        run: |
          cd base
          pytest -q

  train-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd base
          pip install -r requirements.txt
      - name: Run 10 training steps (CPU)
        env:
          TRANSFORMERS_OFFLINE: "1"
        run: |
          cd base
          python -m transformer.train --config transformer/config.yaml --max-steps 10

